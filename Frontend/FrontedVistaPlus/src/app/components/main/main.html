<main class="app-main">
  <section class="main-content">
    @for (obra of obrasFiltradas; track obra.id) {
      <div class="obra" [routerLink]="['/obra', obra.id]" style="cursor: pointer;">
        <img class="imagen" [src]="obra.imagen" [alt]="obra.titulo">
        <div class="obra-info">
          <h1 class="titulo">{{obra.titulo}}</h1>
          <p class="descripcion">{{obra.descripcion}}</p>
        </div>
      </div>
    }
  </section>
</main>
