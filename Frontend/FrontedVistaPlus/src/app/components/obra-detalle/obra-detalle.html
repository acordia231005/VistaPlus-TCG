<div class="detalle-container" *ngIf="obra; else noEncontrado">
  <a routerLink="/" class="back-button">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
      <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
    </svg>
    Volver
  </a>
  
  <div class="detalle-content">
    <div class="detalle-imagen">
      <img [src]="obra.imagen" [alt]="obra.titulo">
    </div>
    
    <div class="detalle-info">
      <span class="badge">{{obra.tipo | uppercase}}</span>
      <h1 class="titulo-detalle">{{obra.titulo}}</h1>
      
      <div class="meta-info">
        <span *ngIf="obra.anio"><strong>Año:</strong> {{obra.anio}}</span>
        <span *ngIf="obra.director"><strong>Director:</strong> {{obra.director}}</span>
        <span *ngIf="obra.genero"><strong>Género:</strong> {{obra.genero}}</span>
      </div>
      
      <p class="descripcion-detalle">{{obra.descripcion}}</p>
      
      <div class="acciones-detalle">
        <button class="btn-action" [class.active]="enLista()" (click)="toggleLista()" [title]="enLista() ? 'Quitar de la lista' : 'Añadir a mi lista'">
          <svg *ngIf="!enLista()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          <svg *ngIf="enLista()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          <span>{{ enLista() ? 'En mi lista' : 'Mi lista' }}</span>
        </button>

        <button class="btn-action" [class.active]="visto()" (click)="toggleVisto()" [title]="visto() ? 'Marcar como no visto' : 'Marcar como visto'">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path *ngIf="!visto()" d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle *ngIf="!visto()" cx="12" cy="12" r="3"></circle>
            <path *ngIf="visto()" d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line *ngIf="visto()" x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
          <span>{{ visto() ? 'Visto' : 'Marcar visto' }}</span>
        </button>
      </div>

      <div class="comentarios-section">
        <h3>Comentarios</h3>
        <div class="comentario-input-wrapper glass">
          <textarea placeholder="Escribe tu opinión sobre esta obra..." #commentText></textarea>
          <button class="btn-send" (click)="enviarComentario(commentText.value); commentText.value = ''">
            Publicar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #noEncontrado>
  <div class="detalle-container">
    <h2>Obra no encontrada</h2>
    <a routerLink="/" class="btn-primary">Volver al inicio</a>
  </div>
</ng-template>
