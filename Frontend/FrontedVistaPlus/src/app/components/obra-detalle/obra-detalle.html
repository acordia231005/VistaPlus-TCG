<div class="detalle-container" *ngIf="obra; else noEncontrado">
  <a routerLink="/" class="back-button">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
      <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
    </svg>
    Volver
  </a>
  
  <div class="detalle-content">
    <div class="detalle-imagen">
      <img [src]="obra.imagen" [alt]="obra.titulo">
    </div>
    
    <div class="detalle-info">
      <span class="badge">{{obra.tipo | uppercase}}</span>
      <h1 class="titulo-detalle">{{obra.titulo}}</h1>
      
      <div class="meta-info">
        <span *ngIf="obra.anio"><strong>Año:</strong> {{obra.anio}}</span>
        <span *ngIf="obra.director"><strong>Director:</strong> {{obra.director}}</span>
        <span *ngIf="obra.genero"><strong>Género:</strong> {{obra.genero}}</span>
      </div>
      
      <p class="descripcion-detalle">{{obra.descripcion}}</p>
      
      <button class="btn-primary">Ver ahora</button>
    </div>
  </div>
</div>

<ng-template #noEncontrado>
  <div class="detalle-container">
    <h2>Obra no encontrada</h2>
    <a routerLink="/" class="btn-primary">Volver al inicio</a>
  </div>
</ng-template>
