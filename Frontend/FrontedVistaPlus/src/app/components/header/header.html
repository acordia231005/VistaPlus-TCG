<header class="app-header">

    <div class="logo">
      <img src="Titulo.png" alt="Titulo">
    </div>

    <div class="header-right">
      <nav class="nav">
        <a routerLink="/">Inicio</a>
        <a routerLink="/peliculas">Peliculas</a>
        <a routerLink="/series">Series</a>
        <a routerLink="/libros">Libros</a>
      </nav>

      <div class="busqueda">
        <input type="text" placeholder="Buscar..." class="search-input" #searchInput (keyup.enter)="buscar(searchInput.value)">
        <button class="search-button" type="button" (click)="buscar(searchInput.value)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
          </svg>
        </button>
      </div>

      <!-- User account icon -->
      <div class="user-menu-container">
        <button class="user-avatar" id="user-avatar-btn" (click)="toggleMenu()" aria-label="Menú de usuario">
          <span class="avatar-initial">{{ authService.currentUser()?.nombre?.charAt(0)?.toUpperCase() || 'U' }}</span>
          <span class="avatar-status-dot"></span>
        </button>

        @if (menuOpen()) {
          <div class="user-dropdown" id="user-dropdown">
            <!-- User info header -->
            <div class="dropdown-header">
              <div class="dropdown-avatar-lg">
                <span>{{ authService.currentUser()?.nombre?.charAt(0)?.toUpperCase() || 'U' }}</span>
              </div>
              <div class="dropdown-user-info">
                <span class="dropdown-name">{{ authService.currentUser()?.nombre || 'Usuario' }}</span>
                <span class="dropdown-email">{{ authService.currentUser()?.email || '' }}</span>
              </div>
            </div>

            <div class="dropdown-divider"></div>

            <!-- Menu items -->
            <div class="dropdown-section">
              <!-- Mi Perfil -->
              <a class="dropdown-item" id="profile-btn" routerLink="/perfil" (click)="closeMenu()">
                <div class="dropdown-item-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                  </svg>
                </div>
                <div class="dropdown-item-text">
                  <span class="dropdown-item-label">Mi Perfil</span>
                  <span class="dropdown-item-desc">Ver y editar tu perfil</span>
                </div>
              </a>

              <!-- Mi Lista -->
              <a class="dropdown-item" id="mylist-btn" routerLink="/lista" (click)="closeMenu()">
                <div class="dropdown-item-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                  </svg>
                </div>
                <div class="dropdown-item-text">
                  <span class="dropdown-item-label">Mi Lista</span>
                  <span class="dropdown-item-desc">Títulos guardados</span>
                </div>
              </a>

              <!-- Historial -->
              <button class="dropdown-item" id="history-btn" (click)="closeMenu()">
                <div class="dropdown-item-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                  </svg>
                </div>
                <div class="dropdown-item-text">
                  <span class="dropdown-item-label">Historial</span>
                  <span class="dropdown-item-desc">Vistos recientemente</span>
                </div>
              </button>
            </div>

            <div class="dropdown-divider"></div>

            <div class="dropdown-section">
              <!-- Configuración -->
              <button class="dropdown-item" id="settings-btn" (click)="closeMenu()">
                <div class="dropdown-item-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                  </svg>
                </div>
                <div class="dropdown-item-text">
                  <span class="dropdown-item-label">Configuración</span>
                  <span class="dropdown-item-desc">Preferencias de la app</span>
                </div>
              </button>

              <!-- Ayuda -->
              <button class="dropdown-item" id="help-btn" (click)="closeMenu()">
                <div class="dropdown-item-icon">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                  </svg>
                </div>
                <div class="dropdown-item-text">
                  <span class="dropdown-item-label">Ayuda</span>
                  <span class="dropdown-item-desc">Centro de soporte</span>
                </div>
              </button>
            </div>

            <div class="dropdown-divider"></div>

            <!-- Cerrar sesión -->
            <button class="dropdown-item dropdown-item-danger" id="logout-btn" (click)="logout()">
              <div class="dropdown-item-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
              </div>
              <div class="dropdown-item-text">
                <span class="dropdown-item-label">Cerrar sesión</span>
              </div>
            </button>
          </div>
        }
      </div>
    </div>

</header>
